# topology documentation: 
name: forti
prefix: sdwan

topology:
  groups:
    fortigate:
      kind: fortinet_fortigate
      image: jalinare/vr-fortios:7.0.3
    client:
      kind: linux
      image: ghcr.io/hellt/network-multitool:latest
    switch:
      kind: cisco_iol
      image: jalinare/cisco_iol:L2-17.16.01
      type: L2
    router:
      kind: cisco_iol
      image: jalinare/cisco_iol:17.16.01
      type: iol
  nodes:
    virbr0:
      kind: bridge
    isp:
      group: router
      startup-config: "configs/isp.cfg.partial"
    fw1-hub:
      group: fortigate
    fw2-hub:
      group: fortigate
    sw1-hub:
      group: switch
    sw2-hub:
      group: switch
    fw1-site1:
      group: fortigate
    fw2-site1:
      group: fortigate
    sw1-site1:
      group: switch
    sw2-site1:
      group: switch
    fw1-site2:
      group: fortigate
    fw2-site2:
      group: fortigate
    sw1-site2:
      group: switch
    sw2-site2:
      group: switch
    n1:
      group: client
      kind: linux
      image: ghcr.io/hellt/network-multitool:latest
    n2:
      group: client
      kind: linux
      image: ghcr.io/hellt/network-multitool:latest
    n3:
      group: client
      kind: linux
      image: ghcr.io/hellt/network-multitool:latest
  links:
    - endpoints: [ "isp:e0/1", "virbr0:eth3" ]

    - endpoints: [ "sw1-hub:e0/1", "isp:e0/2" ]
    - endpoints: [ "sw1-hub:e0/2", "fw1-hub:port2" ]
    - endpoints: [ "sw1-hub:e0/3", "fw2-hub:port2" ]
    - endpoints: [ "sw2-hub:e0/1", "isp:e0/3" ]
    - endpoints: [ "sw2-hub:e0/2", "fw1-hub:port3" ]
    - endpoints: [ "sw2-hub:e0/3", "fw2-hub:port3" ]
    - endpoints: [ "n1:eth1", "sw1-hub:e1/0" ]
    - endpoints: [ "n1:eth2", "sw2-hub:e1/0" ]

    - endpoints: [ "sw1-site1:e0/1", "isp:e1/0" ]
    - endpoints: [ "sw1-site1:e0/2", "fw1-site1:port2" ]
    - endpoints: [ "sw1-site1:e0/3", "fw2-site1:port2" ]
    - endpoints: [ "sw2-site1:e0/1", "isp:e1/1" ]
    - endpoints: [ "sw2-site1:e0/2", "fw1-site1:port3" ]
    - endpoints: [ "sw2-site1:e0/3", "fw2-site1:port3" ]
    - endpoints: [ "n2:eth1", "sw1-site1:e1/0" ]
    - endpoints: [ "n2:eth2", "sw2-site1:e1/0" ]

    - endpoints: [ "sw1-site2:e0/1", "isp:e1/2" ]
    - endpoints: [ "sw1-site2:e0/2", "fw1-site2:port2" ]
    - endpoints: [ "sw1-site2:e0/3", "fw2-site2:port2" ]
    - endpoints: [ "sw2-site2:e0/1", "isp:e1/3" ]
    - endpoints: [ "sw2-site2:e0/2", "fw1-site2:port3" ]
    - endpoints: [ "sw2-site2:e0/3", "fw2-site2:port3" ]
    - endpoints: [ "n3:eth1", "sw1-site2:e1/0" ]
    - endpoints: [ "n3:eth2", "sw2-site2:e1/0" ]
