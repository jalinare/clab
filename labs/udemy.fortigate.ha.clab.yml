# topology documentation: 
name: fortigate
prefix: ha

topology:
  groups:
    fortigate:
      kind: fortinet_fortigate
      image: jalinare/vr-fortios:7.0.3
    client:
      kind: linux
      image: ghcr.io/hellt/network-multitool:latest
    switch:
      kind: cisco_iol
      image: jalinare/cisco_iol:L2-17.16.01
      type: L2
    router:
      kind: cisco_iol
      image: jalinare/cisco_iol:17.16.01
      type: iol
  nodes:
    virbr0:
      kind: bridge
    isp:
      group: router
      startup-config: "configs/isp.cfg.partial"
    fw1:
      group: fortigate
    fw2:
      group: fortigate
    sw-ext:
      group: switch
      startup-config: "configs/sw-ext.cfg.partial"
    sw-int:
      group: switch
    n1:
      group: client
      kind: linux
      image: ghcr.io/hellt/network-multitool:latest
    n2:
      group: client
      kind: linux
      image: ghcr.io/hellt/network-multitool:latest
    n3:
      group: client
      kind: linux
      image: ghcr.io/hellt/network-multitool:latest
    rtr2:
      group: router
  links:
    - endpoints: [ "isp:e0/1", "virbr0:eth3" ]

    - endpoints: [ "sw-ext:e0/1", "isp:e0/2" ]
    - endpoints: [ "sw-ext:e0/2", "isp:e0/3" ]
    - endpoints: [ "sw-ext:e0/3", "fw1:port2" ]
    - endpoints: [ "sw-ext:e1/0", "fw1:port3" ]
    - endpoints: [ "sw-ext:e1/1", "fw2:port2" ]
    - endpoints: [ "sw-ext:e1/2", "fw2:port3" ]

    - endpoints: [ "sw-int:e0/1", "fw1:port4" ]
    - endpoints: [ "sw-int:e0/2", "fw2:port4" ]
    - endpoints: [ "sw-int:e0/3", "n1:eth1" ]
    - endpoints: [ "sw-int:e1/0", "n2:eth1" ]

    - endpoints: [ "fw1:port6", "fw2:port6" ]
    - endpoints: [ "fw1:port7", "fw2:port7" ]

    - endpoints: [ "rtr2:e0/2", "isp:1/0" ]
    - endpoints: [ "rtr2:e0/3", "n3:eth1" ]
